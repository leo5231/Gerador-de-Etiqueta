<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limpador de Texto | FastShop</title>

  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #5b6472;
      --brand: #1246ff;
      --brand-2: #0d36c7;
      --line: #e4e8f1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      background: var(--bg);
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 32px rgba(13, 54, 199, 0.08);
    }

    .header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, #f8faff, #eef3ff);

      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 22px;
    }

    .sub {
      margin: 4px 0 0;
      font-size: 14px;
      color: var(--muted);
    }

    .content {
      padding: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: bold;
      color: var(--muted);
    }

    textarea {
      width: 100%;
      min-height: 240px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccd3e2;
      resize: vertical;

      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;

      outline: none;
    }

    textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(18, 70, 255, 0.12);
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .btn {
      min-height: 42px;
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid transparent;

      font-size: 14px;
      font-weight: bold;

      cursor: pointer;
      transition: 0.18s ease;
    }

    .btn-primary {
      background: var(--brand);
      color: white;
    }

    .btn-primary:hover {
      background: var(--brand-2);
    }

    .btn-secondary {
      background: white;
      border-color: #cbd7ff;
      color: var(--brand);
    }

    .btn-secondary:hover {
      background: #f1f5ff;
    }

    pre {
      margin-top: 14px;
      padding: 14px;

      min-height: 160px;
      max-height: 500px;
      overflow: auto;

      border-radius: 10px;
      border: 1px solid #ccd3e2;

      background: #fafcff;

      white-space: pre-wrap;
      word-break: break-word;

      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .content {
        padding: 18px;
      }

      .buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <main class="container">

    <header class="header">
      <div>
        <h1>Limpador de Texto</h1>
        <p class="sub">
          Extrai automaticamente o tipo e o SKU do relatório GAN.
        </p>
      </div>

      <a class="btn btn-secondary" href="index.html">
        Voltar para a home
      </a>
    </header>

    <section class="content">

      <label for="input">
        Texto bruto vindo do GAN
      </label>

      <textarea
        id="input"
        placeholder="Cole o relatório aqui..."
        aria-label="Texto bruto vindo do GAN"
      ></textarea>

      <div class="buttons">
        <button
          class="btn btn-primary"
          onclick="processar()"
        >
          Processar
        </button>

        <button
          class="btn btn-secondary"
          onclick="copiarResultado()"
        >
          Copiar resultado
        </button>
      </div>

      <label
        for="output"
        style="margin-top: 18px;"
      >
        Resultado limpo
      </label>

      <pre id="output"></pre>

    </section>

  </main>

  <script>

    function processar() {

      const input =
        document.getElementById("input").value;

      const linhas = input.split("\n");

      let resultado = [];

      linhas.forEach(linha => {

        linha = linha.trim();

        if (!linha) return;

        // separa por múltiplos espaços/tabs
        const partes = linha.split(/\s+/);

        /*
          Estrutura esperada:

          M  01  B720  KIKUA20AVVRM1
        */

        if (partes.length < 4) return;

        const tipo = partes[0];
        const sku = partes[3];

        // ignora linhas inválidas
        if (!/^[A-Z0-9]+$/i.test(sku)) return;

        resultado.push(`${tipo}   ${sku}`);

      });

      document.getElementById("output").textContent =
        resultado.join("\n");

    }

    function copiarResultado() {

      const texto =
        document.getElementById("output").textContent;

      if (!texto.trim()) {
        alert("Nada para copiar.");
        return;
      }

      navigator.clipboard.writeText(texto)
        .then(() => {
          alert("Resultado copiado com sucesso!");
        })
        .catch(() => {
          alert("Erro ao copiar resultado.");
        });

    }

  </script>

</body>
</html>
