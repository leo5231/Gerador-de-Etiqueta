<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gerador de Etiquetas</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode/dist/JsBarcode.all.min.js"></script>

  <!-- html2canvas -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <!-- jsPDF -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #5b6472;
      --brand: #1246ff;
      --brand-2: #0d36c7;
      --line: #e4e8f1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 10px 32px rgba(13, 54, 199, 0.08);
      overflow: hidden;
    }

    .header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, #f8faff, #eef3ff);
    }

    .content {
      padding: 22px 24px 26px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
    }

    .sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 14px;
    }

    .controls {
      display: grid;
      gap: 12px;
      max-width: 520px;
    }

    textarea {
      padding: 10px;
      width: 100%;
      font-size: 13px;
      border: 1px solid #ccd3e2;
      border-radius: 10px;
      min-height: 140px;
      font-family: Consolas, monospace;
    }

    button {
      min-height: 40px;
      padding: 8px 14px;
      border-radius: 9px;
      cursor: pointer;
      font-weight: bold;
      border: none;
    }

    .btn-primary {
      background: var(--brand);
      color: white;
    }

    .btn-secondary {
      background: white;
      border: 1px solid #cbd7ff;
    }

    .button-row {
      display: flex;
      gap: 8px;
    }

    #status {
      font-weight: bold;
    }

    /* ÁREA DAS PÁGINAS */
    #resultado {
      margin-top: 30px;
    }

    .pagina {
      width: 210mm;
      height: 297mm;

      background: white;

      display: grid;
      grid-template-columns: repeat(5, 1fr);

      column-gap: 10px;
      row-gap: 13px;

      padding: 0;
      margin: 0 auto 20px auto;

      padding-top: 35px;
      padding-bottom: 13px;
    
      overflow: hidden;

      /* CRÍTICO */
      position: relative;

      /* trava tamanho */
      min-height: 297mm;
      max-height: 297mm;
    }

    .etiqueta {
      height: 70px;

      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;

      font-size: 8px;

      gap: 1px;

      overflow: hidden;
    }

    .linha-topo {
      display: flex;
      gap: 4px;
      font-weight: bold;
      font-size: 8px;
    }

    .descricao {
      font-size: 7px;
      line-height: 1;
      max-width: 100%;
      overflow: hidden;
    }

    .ean-text {
      font-size: 6px;
      margin-top: -2px;
    }

    svg {
      overflow: visible;
    }

    @media print {
      body {
        background: white;
        padding: 0;
      }

      .pagina {
        margin: 0;
        page-break-after: always;
      }
    }
  </style>
</head>

<body>

<main class="container">

  <section class="content">

    <div class="controls">

      <textarea id="skuInput"></textarea>

      <div class="button-row">
        <button class="btn-primary" onclick="buscarSKU()">
          Buscar
        </button>

        <button class="btn-secondary" onclick="gerarPDF()">
          Gerar PDF
        </button>
      </div>

      <p id="status">Carregando...</p>

    </div>

    <div id="resultado"></div>

  </section>

</main>

<script>

let dados = [];

const skuInputEl = document.getElementById("skuInput");
const resultadoEl = document.getElementById("resultado");
const statusEl = document.getElementById("status");

fetch('./etiquetas adesivas i.xlsx')
.then(r => r.arrayBuffer())
.then(data => {

  const wb = XLSX.read(data, { type: "array" });

  const sheet = wb.Sheets[wb.SheetNames[0]];

  const linhas = XLSX.utils.sheet_to_json(sheet, {
    header: 1,
    raw: false,
    defval: ""
  });

  linhas.shift();

  dados = linhas.map(l => ({
    SKU: String(l[0] ?? "").trim(),
    EAN: String(l[1] ?? "").trim(),
    DESCRICAO: String(l[3] ?? "").trim(),
    CATEGORIA: String(l[4] || "").substring(0,2).toUpperCase(),
    LOCACAO: "M"
  }));

  statusEl.textContent = "✔ Planilha carregada";

});

function normalizarSku(v) {
  return String(v ?? "")
    .replace(/\u00A0/g, " ")
    .replace(/[\u200B-\u200D\uFEFF]/g, "")
    .trim()
    .toUpperCase()
    .replace(/\s+/g, "");
}

function normalizarEan(v) {
  return String(v ?? "").replace(/\D/g, "");
}

function buscarSKU() {

  resultadoEl.innerHTML = "";

  const linhas = skuInputEl.value
    .split("\n")
    .map(l => l.trim())
    .filter(l => l);

  let etiquetas = [];

  linhas.forEach(linha => {

    const partes = linha.split(/\s+/);

    const locacao = (partes.length >= 2 ? partes[0] : "").toUpperCase();

    const codigoBruto =
      partes.length >= 2
      ? partes[1]
      : partes[0];

    const codigoSku = normalizarSku(codigoBruto);

    const codigoEan = normalizarEan(codigoBruto);

    if (!codigoSku && !codigoEan) return;

    let item = dados.find(d => {

      if (codigoEan.length === 13) {
        return normalizarEan(d.EAN) === codigoEan;
      }

      return normalizarSku(d.SKU) === codigoSku;

    });

    if (!item && codigoSku) {

      const variantes = new Set([
        codigoSku,
        codigoSku.replace(/O/g, "0"),
        codigoSku.replace(/0/g, "O"),
      ]);

      item = dados.find(d =>
        variantes.has(normalizarSku(d.SKU))
      );
    }

    const div = document.createElement("div");

    div.className = "etiqueta";

    if (item) {

      const id = "b" + Math.random().toString(36).slice(2);

      let ean = normalizarEan(item.EAN);

      if (ean.length === 12) {
        ean = `0${ean}`;
      }

      if (ean.length !== 13) {

        div.innerHTML = `
          ${codigoSku || codigoEan} ❌ EAN inválido
        `;

        etiquetas.push(div);

        return;
      }

      div.innerHTML = `
        <div class="linha-topo">
          <span>${item.SKU}</span>
          <span>${locacao}</span>
          <span>${item.CATEGORIA}</span>
        </div>

        <div class="descricao">
          ${item.DESCRICAO}
        </div>

        <svg id="${id}"></svg>

        <div class="ean-text">
          ${ean}
        </div>
      `;

      setTimeout(() => {

        JsBarcode(`#${id}`, ean, {
          format: "EAN13",
          width: 1,
          height: 22,
          displayValue: false,
          margin: 1
        });

      }, 0);

    } else {

      div.innerHTML = `
        ${codigoSku || codigoEan} ❌
      `;

    }

    etiquetas.push(div);

  });

  /* PAGINAÇÃO */
  for (let i = 0; i < etiquetas.length; i += 65) {

const pagina = document.createElement("div");

pagina.className = "pagina";

const bloco = etiquetas.slice(i, i + 65);

bloco.forEach(el => pagina.appendChild(el));

/* COMPLETA OS ESPAÇOS VAZIOS */
const faltando = 65 - bloco.length;

for (let j = 0; j < faltando; j++) {

  const fake = document.createElement("div");

  fake.className = "etiqueta";

  /* invisível mas ocupando espaço */
  fake.style.visibility = "hidden";

  pagina.appendChild(fake);

}

resultadoEl.appendChild(pagina);

}

  statusEl.textContent = "✔ Busca finalizada";

}

/* PDF NOVO - RENDERIZA UMA PÁGINA POR VEZ */
async function gerarPDF() {

  const paginas = document.querySelectorAll(".pagina");

  if (!paginas.length) {
    alert("Nenhuma etiqueta encontrada.");
    return;
  }

  statusEl.textContent = "Gerando PDF...";

  const { jsPDF } = window.jspdf;

  const pdf = new jsPDF({
    orientation: "portrait",
    unit: "mm",
    format: "a4"
  });

  for (let i = 0; i < paginas.length; i++) {

    const pagina = paginas[i];

    /* renderiza SOMENTE esta página */
    const canvas = await html2canvas(pagina, {
      scale: 3,
      useCORS: true,
      backgroundColor: "#ffffff"
    });

    const imgData = canvas.toDataURL("image/jpeg", 1.0);

    if (i > 0) {
      pdf.addPage();
    }

    pdf.addImage(
      imgData,
      'JPEG',
      0,
      0,
      210,
      297
    );

  }

  pdf.save("etiquetas.pdf");

  statusEl.textContent = "✔ PDF gerado";

}

</script>

</body>
</html>
