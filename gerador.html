<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gerador de Etiquetas</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode/dist/JsBarcode.all.min.js"></script>

  <!-- html2canvas -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <!-- jsPDF -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #5b6472;
      --brand: #1246ff;
      --brand-2: #0d36c7;
      --line: #e4e8f1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 10px 32px rgba(13, 54, 199, 0.08);
      overflow: hidden;
    }

    .content {
      padding: 22px 24px 26px;
    }

    .controls {
      display: grid;
      gap: 12px;
      max-width: 520px;

      background: #fafcff;
      padding: 18px;
      border-radius: 14px;
      border: 1px solid #e7edff;
    }

    textarea {
      padding: 10px;
      width: 100%;
      font-size: 13px;
      border: 1px solid #ccd3e2;
      border-radius: 10px;
      min-height: 140px;
      font-family: Consolas, monospace;

      transition:
        border-color 0.2s ease,
        box-shadow 0.2s ease;
    }

    textarea:focus {
      outline: none;
      border-color: #1246ff;
      box-shadow: 0 0 0 3px rgba(18, 70, 255, 0.12);
    }

    button {
      min-height: 40px;
      padding: 8px 14px;
      border-radius: 9px;
      cursor: pointer;
      font-weight: bold;
      border: none;

      transition:
        background 0.2s ease,
        transform 0.15s ease,
        box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .btn-primary {
      background: var(--brand);
      color: white;
    }

    .btn-primary:hover {
      background: var(--brand-2);
    }

    .btn-secondary {
      background: white;
      border: 1px solid #cbd7ff;
    }

    .btn-secondary:hover {
      background: #f7f9ff;
    }

    .btn-nav {
      background: #eef2ff;
      color: #1246ff;
      border: 1px solid #cbd7ff;
    }

    .btn-nav:hover {
      background: #dfe7ff;
    }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    #status {
      font-weight: bold;

      padding: 10px 12px;
      background: #f3f6ff;
      border-radius: 10px;
      border: 1px solid #dce6ff;
      color: #2340a0;
      font-size: 13px;
      width: fit-content;
    }

    #resultado {
      margin-top: 30px;
    }

    .pagina {
      width: 210mm;
      height: 297mm;

      background: white;

      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-auto-rows: 70px;

      column-gap: 10px;
      row-gap: 13px;

      padding-top: 35px;
      padding-bottom: 13px;

      margin: 0 auto 20px auto;

      overflow: hidden;

      position: relative;
    }

    .etiqueta {
      height: 70px;

      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;

      font-size: 8px;

      gap: 1px;

      overflow: hidden;
    }

    .linha-topo {
      display: flex;
      gap: 4px;
      font-weight: bold;
      font-size: 8px;
    }

    .descricao {
      font-size: 7px;
      line-height: 1;
      max-width: 100%;
      overflow: hidden;
    }

    .ean-text {
      font-size: 6px;
      margin-top: -2px;
    }

    svg {
      overflow: visible;
    }

    @media print {

      body {
        background: white;
        padding: 0;
      }

      .pagina {
        margin: 0;
        page-break-after: always;
      }

    }
  </style>
</head>

<body>

<main class="container">

  <section class="content">

    <div class="controls">

      <textarea id="skuInput"></textarea>

      <div class="button-row">

        <button class="btn-primary" onclick="buscarSKU()">
          Buscar
        </button>

        <button class="btn-secondary" onclick="gerarPDF()">
          Gerar PDF
        </button>

        <button class="btn-nav" onclick="window.location.href='index.html'">
          Home
        </button>

        <button class="btn-nav" onclick="window.location.href='limpador.html'">
          Limpador
        </button>

      </div>

      <p id="status">Carregando...</p>

    </div>

    <div id="resultado"></div>

  </section>

</main>

<script>

let dados = [];

const skuInputEl = document.getElementById("skuInput");
const resultadoEl = document.getElementById("resultado");
const statusEl = document.getElementById("status");

/* CARREGA PLANILHA */
fetch('./etiquetas adesivas i.xlsx')
.then(r => r.arrayBuffer())
.then(data => {

  const wb = XLSX.read(data, {
    type: "array"
  });

  const sheet = wb.Sheets[wb.SheetNames[0]];

  const linhas = XLSX.utils.sheet_to_json(sheet, {
    header: 1,
    raw: true,
    defval: ""
  });

  linhas.shift();

  dados = linhas.map(l => ({

    SKU: String(l[0] ?? "").trim(),

    EAN: String(l[1] ?? "").trim(),

    DESCRICAO: String(l[3] ?? "").trim(),

    CATEGORIA: String(l[4] || "")
      .substring(0, 2)
      .toUpperCase(),

    LOCACAO: "M"

  }));

  statusEl.textContent = "✔ Planilha carregada";

})
.catch(err => {

  console.error(err);

  statusEl.textContent = "❌ Erro ao carregar planilha";

});

/* NORMALIZA SKU */
function normalizarSku(v) {

  return String(v ?? "")
    .replace(/\u00A0/g, " ")
    .replace(/[\u200B-\u200D\uFEFF]/g, "")
    .trim()
    .toUpperCase()
    .replace(/\s+/g, "");

}

/* NORMALIZA EAN PARA BUSCA */
function normalizarEan(v) {

  return String(v ?? "")
    .replace(/\D/g, "");

}

function buscarSKU() {

  resultadoEl.innerHTML = "";

  const linhas = skuInputEl.value
    .split("\n")
    .map(l => l.trim())
    .filter(Boolean);

  let etiquetas = [];

  linhas.forEach(linha => {

    const partes = linha.split(/\s+/);

    const locacao =
      (partes.length >= 2
      ? partes[0]
      : "").toUpperCase();

    const codigoBruto =
      partes.length >= 2
      ? partes[1]
      : partes[0];

    const codigoSku =
      normalizarSku(codigoBruto);

    const codigoEan =
      normalizarEan(codigoBruto);

    if (!codigoSku && !codigoEan) {
      return;
    }

    let item = dados.find(d => {

      if (codigoEan.length >= 8) {

        return (
          normalizarEan(d.EAN) === codigoEan
        );

      }

      return (
        normalizarSku(d.SKU) === codigoSku
      );

    });

    /* VARIAÇÕES O/0 */
    if (!item && codigoSku) {

      const variantes = new Set([

        codigoSku,

        codigoSku.replace(/O/g, "0"),

        codigoSku.replace(/0/g, "O"),

      ]);

      item = dados.find(d =>
        variantes.has(
          normalizarSku(d.SKU)
        )
      );

    }

    const div = document.createElement("div");

    div.className = "etiqueta";

    /* ITEM NÃO ENCONTRADO */
    if (!item) {

      div.innerHTML = `
        ${codigoSku || codigoEan} ❌
      `;

      etiquetas.push(div);

      return;

    }

    const id =
      "b" +
      Math.random()
      .toString(36)
      .slice(2);

    /* EAN ORIGINAL DA PLANILHA */
    let ean =
      String(item.EAN ?? "").trim();

    /* DEFINE FORMATO */
    let formato = "CODE128";

    if (/^\d{13}$/.test(ean)) {

      formato = "EAN13";

    }

    div.innerHTML = `
      <div class="linha-topo">

        <span>${item.SKU}</span>

        <span>${locacao}</span>

        <span>${item.CATEGORIA}</span>

      </div>

      <div class="descricao">
        ${item.DESCRICAO}
      </div>

      <svg id="${id}"></svg>

      <div class="ean-text">
        ${ean}
      </div>
    `;

    etiquetas.push(div);

    setTimeout(() => {

      try {

        JsBarcode(`#${id}`, ean, {

          format: formato,

          width: 1,

          height: 22,

          displayValue: false,

          margin: 1

        });

      } catch (err) {

        console.error(
          "Erro barcode:",
          ean,
          err
        );

      }

    }, 0);

  });

  /* PAGINAÇÃO */
  for (let i = 0; i < etiquetas.length; i += 65) {

    const pagina =
      document.createElement("div");

    pagina.className = "pagina";

    const bloco =
      etiquetas.slice(i, i + 65);

    bloco.forEach(el =>
      pagina.appendChild(el)
    );

    /* COMPLETA VAZIOS */
    const faltando =
      65 - bloco.length;

    for (let j = 0; j < faltando; j++) {

      const fake =
        document.createElement("div");

      fake.className = "etiqueta";

      fake.style.visibility = "hidden";

      pagina.appendChild(fake);

    }

    resultadoEl.appendChild(pagina);

  }

  statusEl.textContent =
    "✔ Busca finalizada";

}

/* GERAR PDF */
async function gerarPDF() {

  const paginas =
    document.querySelectorAll(".pagina");

  if (!paginas.length) {

    alert("Nenhuma etiqueta encontrada.");

    return;

  }

  statusEl.textContent =
    "Gerando PDF...";

  /* GARANTE RENDER DOS BARCODES */
  await new Promise(r =>
    setTimeout(r, 300)
  );

  const { jsPDF } = window.jspdf;

  const pdf = new jsPDF({

    orientation: "portrait",

    unit: "mm",

    format: "a4"

  });

  for (let i = 0; i < paginas.length; i++) {

    const pagina = paginas[i];

    const canvas =
      await html2canvas(pagina, {

        scale: 2,

        useCORS: true,

        backgroundColor: "#ffffff"

      });

    const imgData =
      canvas.toDataURL("image/png");

    if (i > 0) {

      pdf.addPage();

    }

    pdf.addImage(

      imgData,

      "PNG",

      0,

      0,

      210,

      297

    );

    /* LIMPA MEMÓRIA */
    canvas.width = 0;
    canvas.height = 0;

  }

  pdf.save("etiquetas.pdf");

  statusEl.textContent =
    "✔ PDF gerado";

}

</script>

</body>
</html>
