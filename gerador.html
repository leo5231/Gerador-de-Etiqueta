<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Etiquetas</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode/dist/JsBarcode.all.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #5b6472;
      --brand: #1246ff;
      --brand-2: #0d36c7;
      --line: #e4e8f1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 10px 32px rgba(13, 54, 199, 0.08);
      overflow: hidden;
    }

    .header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, #f8faff, #eef3ff);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 22px;
    }

    .sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .content {
      padding: 22px 24px 26px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      max-width: 520px;
    }

    label {
      font-size: 13px;
      color: var(--muted);
      font-weight: bold;
    }

    textarea {
      padding: 10px;
      width: 100%;
      font-size: 13px;
      border: 1px solid #ccd3e2;
      border-radius: 10px;
      resize: vertical;
      min-height: 140px;
      font-family: Consolas, "Courier New", monospace;
      background: #fff;
    }

    button {
      min-height: 40px;
      padding: 8px 14px;
      border-radius: 9px;
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: 0.18s ease;
    }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: var(--brand);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--brand-2);
    }

    .btn-secondary {
      background: #fff;
      color: var(--brand);
      border-color: #cbd7ff;
    }

    .btn-secondary:hover {
      background: #f1f5ff;
    }

    .btn-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 8px 14px;
      border-radius: 9px;
      border: 1px solid #cbd7ff;
      text-decoration: none;
      color: var(--brand);
      font-size: 14px;
      font-weight: bold;
      background: #fff;
      transition: 0.18s ease;
    }

    .btn-link:hover {
      background: #f1f5ff;
    }

    #status {
      margin-top: 2px;
      font-weight: bold;
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      column-gap: 45px;
      row-gap: 12px;
      margin-top: 15px;
      padding-top: 6px;
    }

    .etiqueta {
      height: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      font-size: 8px;
      padding-top: 2px;
      gap: 1px;
    }

    .linha-topo {
      display: flex;
      gap: 4px;
      font-weight: bold;
      font-size: 8px;
    }

    .descricao {
      font-size: 7px;
      line-height: 1;
    }

    svg {
      display: block;
    }

    .ean-text {
      font-size: 6px;
      margin-top: -2px;
      letter-spacing: 0.5px;
    }

    @media (max-width: 1040px) {
      .grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 860px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
<main class="container">
  <header class="header">
    <div>
      <h1>Gerador de etiquetas</h1>
      <p class="sub">Cole os SKUs limpos, busque os produtos e exporte em PDF.</p>
    </div>
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <a class="btn-link" href="index.html">Home</a>
      <a class="btn-link" href="limpador.html">Limpador</a>
    </div>
  </header>

  <section class="content">
    <div class="controls">
      <label for="skuInput">Entrada de SKUs</label>
      <textarea id="skuInput" rows="6" placeholder="Ex:
Q    123456
M    789101"></textarea>

      <div class="button-row">
        <button class="btn-primary" onclick="buscarSKU()">Buscar</button>
        <button class="btn-secondary" onclick="gerarPDF()">Gerar PDF</button>
      </div>

      <p id="status">Carregando...</p>
    </div>

    <div id="resultado" class="grid"></div>
  </section>
</main>

<script>
let dados = [];
const skuInputEl = document.getElementById("skuInput");
const resultadoEl = document.getElementById("resultado");
const statusEl = document.getElementById("status");

fetch('./etiquetas adesivas i.xlsx')
.then(r => r.arrayBuffer())
.then(data => {
  const wb = XLSX.read(data, { type: "array" });
  const sheet = wb.Sheets[wb.SheetNames[0]];
  // Importante: `raw:false` traz o texto formatado da célula (evita EAN em notação científica e ajuda com zeros à esquerda)
  const linhas = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false, defval: "" });
  linhas.shift();

  dados = linhas.map(l => ({
    SKU: String(l[0] ?? "").trim(),
    EAN: String(l[1] ?? "").trim(),
    DESCRICAO: String(l[3] ?? "").trim(),
    CATEGORIA: String(l[4] || "").substring(0,2).toUpperCase(),
    LOCACAO: "M"
  }));

  statusEl.textContent = "✔ Planilha carregada";
});

function normalizarSku(v) {
  // SKU é texto na planilha: manter caracteres (hífen, barra, etc.) e só normalizar espaços/case.
  return String(v ?? "")
    .replace(/\u00A0/g, " ")
    .replace(/[\u200B-\u200D\uFEFF]/g, "") // remove zero-width chars comuns em copy/paste
    .trim()
    .toUpperCase()
    .replace(/\s+/g, ""); // SKU: ignora qualquer espaço (inclusive no meio)
}

function normalizarEan(v) {
  // EAN deve ser apenas dígitos (excel pode trazer com espaços/símbolos)
  return String(v ?? "").replace(/\D/g, "");
}

function buscarSKU() {
  resultadoEl.innerHTML = "";

  const linhas = skuInputEl.value
    .split("\n")
    .map(l => l.trim())
    .filter(l => l);

  linhas.forEach(linha => {
    const partes = linha.split(/\s+/);

    // aceita tanto "Q    123456" quanto apenas "123456"
    const locacao = (partes.length >= 2 ? partes[0] : "").toUpperCase();
    const codigoBruto = partes.length >= 2 ? partes[1] : partes[0];
    const codigoSku = normalizarSku(codigoBruto);
    const codigoEan = normalizarEan(codigoBruto);

    if (!codigoSku && !codigoEan) return;

    // Se o usuário digitou algo que vira um EAN de 13 dígitos, tenta bater por EAN.
    // Caso contrário, busca por SKU (texto).
    let item = dados.find(d => {
      if (codigoEan.length === 13) return normalizarEan(d.EAN) === codigoEan;
      return normalizarSku(d.SKU) === codigoSku;
    });

    // Fallback: alguns SKUs variam entre '0' (zero) e 'O' (letra O) no cadastro/na digitação.
    // Só tenta isso se não achou na busca exata.
    if (!item && codigoSku) {
      const variantes = new Set([
        codigoSku,
        codigoSku.replace(/O/g, "0"),
        codigoSku.replace(/0/g, "O"),
      ]);
      item = dados.find(d => variantes.has(normalizarSku(d.SKU)));
    }

    const div = document.createElement("div");
    div.className = "etiqueta";

    if (item) {
      const id = "b" + Math.random().toString(36).slice(2);
      let ean = normalizarEan(item.EAN);

      // Alguns itens vêm com UPC-A (12 dígitos). Para usar EAN13 no JsBarcode, prefixa 0.
      if (ean.length === 12) {
        ean = `0${ean}`;
      }

      if (ean.length !== 13) {
        div.innerHTML = `${codigoSku || codigoEan} ❌ EAN inválido`;
        resultadoEl.appendChild(div);
        return;
      }

      div.innerHTML = `
        <div class="linha-topo">
          <span>${item.SKU}</span>
          <span>${locacao}</span>
          <span>${item.CATEGORIA}</span>
        </div>
        <div class="descricao">${item.DESCRICAO}</div>
        <svg id="${id}"></svg>
        <div class="ean-text">${ean}</div>
      `;

      setTimeout(() => {
        JsBarcode(`#${id}`, ean, {
          format: "EAN13",
          width: 1,
          height: 22,
          displayValue: false,
          margin: 1
        });
      }, 0);

    } else {
      div.innerHTML = `${codigoSku || codigoEan} ❌`;
    }

    resultadoEl.appendChild(div);
  });

  statusEl.textContent = "✔ Busca finalizada";
}

function gerarPDF() {
  html2pdf().set({
    margin: 5,
    html2canvas: {
      scale: 3,
      useCORS: true
    },
    jsPDF: {
      unit: 'mm',
      format: 'a4'
    }
  }).from(resultadoEl).save();
}
</script>

</body>
</html>
